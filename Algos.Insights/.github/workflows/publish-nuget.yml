name: Publish NuGet Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Build, Pack, Publish
    runs-on: windows-latest

    env:
      PROJECT_PATH: src/Algos.Insights/Algos.Insights.csproj
      PACKAGE_OUTPUT: artifacts/nuget
      NUGET_SOURCE: https://api.nuget.org/v3/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack $env:PROJECT_PATH
          --configuration Release
          --no-build
          --output $env:PACKAGE_OUTPUT
          -p:PackageVersion=0.1.${{ github.run_number }}
          -p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: algos-insights-nuget
          path: artifacts/nuget/*.nupkg

      - name: Publish to NuGet
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: >
          dotnet nuget push "$env:PACKAGE_OUTPUT/*.nupkg"
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source "$env:NUGET_SOURCE"
          --skip-duplicate
