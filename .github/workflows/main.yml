name: Publish NuGet Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build, Pack, Publish
    runs-on: windows-latest

    env:
      PROJECT_PATH: Algos.Insights/src/Algos.Insights/Algos.Insights.csproj
      PACKAGE_OUTPUT: artifacts/nuget
      NUGET_SOURCE: https://api.nuget.org/v3/index.json
      GITHUB_PACKAGES_SOURCE: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 7.0.x

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration Release --no-restore

      - name: Pack
        run: |
          $patch = [int]"${{ github.run_number }}" + 3
          $packageVersion = "2.1.$patch"
          dotnet pack $env:PROJECT_PATH `
            --configuration Release `
            --no-build `
            --output $env:PACKAGE_OUTPUT `
            -p:PackageVersion=$packageVersion `
            -p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: algos-insights-nuget
          path: artifacts/nuget/*.nupkg

      - name: Publish to NuGet
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          $package = Get-ChildItem -Path $env:PACKAGE_OUTPUT -Filter "*.nupkg" | Select-Object -First 1
          if (-not $package) {
            throw "No NuGet package found in $env:PACKAGE_OUTPUT"
          }

          dotnet nuget push $package.FullName `
            --api-key "${{ secrets.NUGET_API_KEY }}" `
            --source "$env:NUGET_SOURCE" `
            --skip-duplicate

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          $package = Get-ChildItem -Path $env:PACKAGE_OUTPUT -Filter "*.nupkg" | Select-Object -First 1
          if (-not $package) {
            throw "No NuGet package found in $env:PACKAGE_OUTPUT"
          }

          dotnet nuget push $package.FullName `
            --api-key "${{ secrets.GT_TOKEN }}" `
            --source "$env:GITHUB_PACKAGES_SOURCE" `
            --skip-duplicate
